<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BD-Susann</title>
</head>
<body>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  #scene {
    width: 100%; min-height: 100vh; position: relative;
    background: linear-gradient(180deg, #a8d8f0 0%, #c8eafa 25%, #d4f0c0 60%, #b8e890 100%);
    font-family: sans-serif; overflow: hidden;
    transition: background 1.5s ease;
  }
  #scene.mode-star {
    background: linear-gradient(180deg, #0a0a2e 0%, #1a1a4e 40%, #0d0d1f 100%);
  }
  #scene.mode-rain {
    background: linear-gradient(180deg, #5a6a7a 0%, #7a8a9a 30%, #9aaabb 60%, #b0c0cc 100%);
  }

    #scene.mode-snow {
  background: linear-gradient(180deg, #6a7a82 0%, #8a9aa2 25%, #a0b0b8 60%, #b8c8d0 100%);
}
  
  #scene.mode-fire {
    background: linear-gradient(180deg, #0a0015 0%, #1a0030 30%, #0d001a 70%, #05000f 100%);
  }

  canvas#bgCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
  canvas#fxCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }

  .photo-frame {
    position: absolute; width: 110px; height: 110px; border-radius: 50%;
    border: 3px solid rgba(120,200,100,0.85);
    box-shadow: 0 0 18px rgba(100,200,80,0.5), 0 0 40px rgba(200,240,100,0.3);
    overflow: hidden; z-index: 5; animation: floatPhoto 5s ease-in-out infinite;
    cursor: pointer; transition: transform 0.3s;
  }
  .photo-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .photo-frame:hover { transform: scale(1.15) !important; }
  @keyframes floatPhoto {
    0%,100% { transform: translateY(0px) rotate(-2deg); }
    50% { transform: translateY(-18px) rotate(2deg); }
  }

  #lightbox {
    display: none; position: fixed; inset: 0; z-index: 999;
    background: rgba(0,0,0,0.85); align-items: center; justify-content: center; cursor: pointer;
  }
  #lightbox.open { display: flex; }
  #lightbox img {
    max-width: 90vw; max-height: 85vh; border-radius: 16px;
    border: 3px solid rgba(120,210,100,0.8);
    box-shadow: 0 0 60px rgba(100,200,80,0.5);
    animation: lbIn 0.35s cubic-bezier(0.175,0.885,0.32,1.275); cursor: default;
  }
  @keyframes lbIn { from{transform:scale(0.6);opacity:0;}to{transform:scale(1);opacity:1;} }
  #lbClose { position: fixed; top: 20px; right: 28px; font-size: 36px; color: #60c040; cursor: pointer; z-index: 1000; line-height:1; user-select:none; }

  .controls {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 20; flex-wrap: wrap; justify-content: center;
  }
  .btn {
    padding: 10px 18px;
    border: 2px solid rgba(80,180,60,0.6);
    background: rgba(255,255,255,0.3);
    color: #2a6020; font-size: 13px; cursor: pointer;
    backdrop-filter: blur(8px); transition: all 0.25s; font-weight: 700;
    clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
  }
  .btn:hover {
    background: rgba(255,255,255,0.6);
    transform: translateY(-3px) scale(1.06);
  }
  .btn.active {
    background: rgba(100,200,80,0.5);
    border-color: #50c030; color: #1a5010;
  }
  .mode-star .btn { color: #ccddff; border-color: rgba(150,150,255,0.5); background: rgba(20,20,80,0.5); }
  .mode-fire .btn { color: #ffddaa; border-color: rgba(255,150,50,0.5); background: rgba(40,0,60,0.5); }

  #cakeWrap {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -55%);
    z-index: 15; display: none; flex-direction: column; align-items: center;
  }
  #cakeWrap.visible { display: flex; }
  .cake-svg { filter: drop-shadow(0 0 24px rgba(120,220,100,0.6)); }

  #surpriseBox {
    position: fixed; inset: 0; z-index: 40; display: none;
    align-items: center; justify-content: center; background: rgba(0,0,0,0.5);
  }
  #surpriseBox.visible { display: flex; }
  .sbox-inner {
    background: linear-gradient(135deg, #1a2a3a, #161616, #a7c5ff);
    border: 2px solid #ffd700; border-radius: 20px; padding: 28px 36px;
    text-align: center; color: #ffeedd; max-width: 340px;
    box-shadow: 0 0 60px rgba(255,180,0,0.4), 0 0 120px rgba(200,100,255,0.3);
    animation: popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275);
  }
  @keyframes popIn { 0%{transform:scale(0) rotate(-10deg);opacity:0;}100%{transform:scale(1) rotate(0);opacity:1;} }
  .sbox-inner h2 { font-size: 24px; color: #ffd700; margin-bottom: 10px; text-shadow: 0 0 20px rgba(255,200,0,0.8); }
  .sbox-inner p { font-size: 15px; color: #ffeedd; line-height: 1.6; }
  .sbox-close { margin-top: 16px; padding: 8px 24px; border-radius: 30px; background: linear-gradient(135deg,#ffd700,#ff8c00); color: #1a0010; border: none; cursor: pointer; font-weight: 700; font-size: 14px; }

  #toastContainer { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 100; pointer-events: none; }
  .toast {
    background: rgba(100,200,70,0.97); color: #1a4010; padding: 10px 24px;
    border-radius: 30px; font-weight: 600; font-size: 15px; margin-bottom: 8px;
    animation: toastIn 0.4s ease, toastOut 0.4s ease 2.6s forwards; white-space: nowrap;
  }
  @keyframes toastIn { from{opacity:0;transform:translateY(-16px);}to{opacity:1;transform:translateY(0);} }
  @keyframes toastOut { to{opacity:0;transform:translateY(-16px);} }

  .title-wrap {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    z-index: 6; text-align: center; pointer-events: none; white-space: nowrap;
    transition: all 0.8s ease;
  }
  .title-row { display: flex; align-items: baseline; justify-content: center; line-height: 1; }
  .title-happy {
    font-family: 'Georgia', serif; font-size: 30px; font-weight: 700; letter-spacing: 2px;
    color: #1e6e10;
    text-shadow: 2px 2px 0 rgba(100,200,60,0.25);
    transition: color 0.8s, text-shadow 0.8s;
  }
  .title-birth {
    font-family: 'Georgia', serif; font-size: 30px; font-weight: 700; letter-spacing: 2px;
    background: linear-gradient(180deg, #88e040 0%, #3a9820 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-left: 10px; transition: all 0.8s;
  }
  .mode-star .title-happy { color: #aabbff; text-shadow: 0 0 20px rgba(150,180,255,0.8); }
  .mode-star .title-birth { background: linear-gradient(180deg,#ffffff,#aabbff); -webkit-background-clip:text; background-clip:text; }
  .mode-fire .title-happy { color: #ffcc44; text-shadow: 0 0 20px rgba(255,180,0,0.9); }
  .mode-fire .title-birth { background: linear-gradient(180deg,#ffee88,#ff8800); -webkit-background-clip:text; background-clip:text; }
  .mode-snow .title-happy { color: #336699; }
  .mode-rain .title-happy { color: #334455; }

  .title-sub {
    font-size: 11px; letter-spacing: 10px; text-transform: uppercase;
    color: rgba(40,120,20,0.65); display: block; margin-top: 4px;
    animation: fadeSlide 1.4s ease both; transition: color 0.8s;
  }
  .mode-star .title-sub { color: rgba(180,200,255,0.7); }
  .mode-fire .title-sub { color: rgba(255,200,100,0.7); }
  .title-icons { font-size: 18px; display: block; margin-top: 3px; letter-spacing: 8px; animation: drift 3.5s ease-in-out infinite; }
  @keyframes fadeSlide { from{opacity:0;letter-spacing:20px;}to{opacity:1;letter-spacing:10px;} }
  @keyframes drift { 0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);} }
</style>

<div id="scene">
  <canvas id="bgCanvas"></canvas>
  <canvas id="fxCanvas"></canvas>

  <div class="title-wrap">
    <div class="title-row">
      <span class="title-happy">Happy</span>
      <span class="title-birth">Birthday</span>
    </div>
    <span class="title-sub">celebrating SUSANN</span>
    <span class="title-icons">🌸 &nbsp; 🎂 &nbsp; 🌷</span>
  </div>

  <div id="toastContainer"></div>

  <div class="controls">
    <button class="btn" id="btnStar" onclick="toggleFX('star')">⭐ Stars</button>
    <button class="btn" id="btnRain" onclick="toggleFX('rain')">🌧️ Rain</button>
    <button class="btn" id="btnSnow" onclick="toggleFX('snow')">❄️ Snow</button>
    <button class="btn" id="btnFire" onclick="toggleFX('fire')">🎆 Fireworks</button>
    <button class="btn" id="btnCake" onclick="toggleCake()">🎂 Surprise Cake</button>
  </div>

  <div id="cakeWrap">
    <svg class="cake-svg" width="220" height="280" viewBox="0 0 220 280">
      <defs>
   <radialGradient id="cg1" cx="50%" cy="30%">
  <stop offset="0%" stop-color="#c4a0c8"/>
  <stop offset="100%" stop-color="#6a2a7a"/>
</radialGradient>

<radialGradient id="cg2" cx="50%" cy="30%">
  <stop offset="0%" stop-color="#d4aa50"/>
  <stop offset="100%" stop-color="#8a6010"/>
</radialGradient>
      </defs>
      <ellipse cx="110" cy="252" rx="90" ry="14" fill="rgba(100,180,60,0.2)"/>
      <rect x="30" y="190" width="160" height="60" rx="8" fill="url(#cg1)"/>
      <rect x="30" y="186" width="160" height="12" rx="6" fill="#fff0f8"/>
      <rect x="50" y="125" width="120" height="65" rx="8" fill="url(#cg2)"/>
      <rect x="50" y="121" width="120" height="12" rx="6" fill="#f0fff0"/>
      <rect x="72" y="72" width="76" height="55" rx="8" fill="url(#cg1)"/>
      <rect x="72" y="68" width="76" height="12" rx="6" fill="#fff0f8"/>
      <circle cx="70" cy="215" r="3" fill="#f0d040"/><circle cx="90" cy="208" r="2.5" fill="#80d060"/>
      <circle cx="115" cy="218" r="3" fill="#f080c0"/><circle cx="140" cy="210" r="2.5" fill="#80c0f0"/>
      <circle cx="160" cy="220" r="3" fill="#f0d040"/>
      <circle cx="80" cy="148" r="2.5" fill="#f0d040"/><circle cx="105" cy="155" r="3" fill="#f080c0"/>
      <circle cx="130" cy="142" r="2.5" fill="#80d060"/>
      <rect x="95" y="46" width="10" height="26" rx="4" fill="#f0d040"/>
      <rect x="115" y="42" width="10" height="30" rx="4" fill="#f080c0"/>
      <rect x="135" y="46" width="10" height="26" rx="4" fill="#80c0f0"/>
      <ellipse cx="100" cy="44" rx="5" ry="8" fill="#ffee44" opacity="0.95"/>
      <ellipse cx="120" cy="40" rx="5" ry="8" fill="#ffcc44" opacity="0.95"/>
      <ellipse cx="140" cy="44" rx="5" ry="8" fill="#ffee44" opacity="0.95"/>
      <text x="110" y="168" text-anchor="middle" font-size="13" fill="#7a5000" font-weight="600" font-family="sans-serif">Happy Birthday!</text>
    </svg>
    <button class="btn" onclick="showSurprise()" style="margin-top:10px;">🎁 Open Surprise!</button>
    <button class="btn" onclick="toggleCake()" style="margin-top:6px;font-size:12px;opacity:0.7;">Close</button>
  </div>

  <div id="surpriseBox">
    <div class="sbox-inner">
      <div style="font-size:48px;margin-bottom:10px;">🎆🎇✨</div>
      <h2>🎉 Surprise Susann! 🎉</h2>
      <p>You are absolutely amazing! May this birthday be filled with magic, laughter, and all the joy you deserve!</p>
      <p style="margin-top:10px;color:#ffd700;font-size:13px;">🌟 The world shines brighter because of you 🌟</p>
      <button class="sbox-close" onclick="closeSurprise()">💛 Thank you!</button>
    </div>
  </div>

  <div id="lightbox" onclick="closeLightbox()">
    <div id="lbClose" onclick="closeLightbox()">✕</div>
    <img id="lbImg" src="" alt="Photo" onclick="event.stopPropagation()"/>
  </div>
</div>

<script>
const bgCanvas = document.getElementById('bgCanvas');
const fxCanvas = document.getElementById('fxCanvas');
const bgCtx = bgCanvas.getContext('2d');
const fxCtx = fxCanvas.getContext('2d');
const scene = document.getElementById('scene');

function resize() {
  const Ww = scene.offsetWidth, Hh = Math.max(window.innerHeight, 600);
  bgCanvas.width = fxCanvas.width = Ww;
  bgCanvas.height = fxCanvas.height = Hh;
  scene.style.minHeight = Hh + 'px';
}
resize(); window.addEventListener('resize', resize);
const W = () => bgCanvas.width, H = () => bgCanvas.height;

const PHOTOS = [
  'https://i.ibb.co/Y4MTb6s8/IMG-2695.jpg',
  'https://i.ibb.co/Pv32MRYW/IMG-2696.jpg',
  'https://i.ibb.co/nvZKmXS/IMG-2694.jpg',
];

function placePhotos() {
  document.querySelectorAll('.photo-frame').forEach(f => f.remove());
  const positions = [[5,25],[72,23],[38,55]];
  const delays = [0,1.2,2.5];
  PHOTOS.forEach((src,i) => {
    const frame = document.createElement('div');
    frame.className = 'photo-frame';
    frame.style.left = positions[i][0]+'%';
    frame.style.top = positions[i][1]+'%';
    frame.style.animationDelay = delays[i]+'s';
    frame.style.animationDuration = (4.5+i*0.4)+'s';
    const img = document.createElement('img');
    img.src = src; img.alt = 'Birthday photo';
    img.onerror = () => { frame.style.background='linear-gradient(135deg,#f0a0c8,#a8e890)'; };
    frame.appendChild(img);
    frame.addEventListener('click', () => openLightbox(src));
    scene.appendChild(frame);
  });
}
placePhotos();
window.addEventListener('resize', placePhotos);

function openLightbox(src) {
  document.getElementById('lbImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeLightbox(); });

// ── Background particles ──
const SPRING = ['🌸','🌺','🌼','🌷','🌻','🍀','🌹','💐','🌸','🌼','🌷','🌸'];
const FROGS  = ['🐸','🌿','🍃','🐸','🌱','🐸','🍀','🐸','🌾','🐸'];
const bgP = [];
for(let i=0;i<45;i++) bgP.push({
  x:Math.random(), y:Math.random(),
  vx:(Math.random()-0.5)*0.001, vy:Math.random()*0.00035+0.0001,
  rot:Math.random()*Math.PI*2, rotV:(Math.random()-0.5)*0.035,
  size:13+Math.random()*15, alpha:0.5+Math.random()*0.5,
  wave:Math.random()*Math.PI*2, waveSpeed:0.005+Math.random()*0.008,
  emoji:SPRING[Math.floor(Math.random()*SPRING.length)], phase:Math.random()*360
});

function drawClouds(ctx, w, h, heavy=false) {
  ctx.save();
  ctx.globalAlpha = heavy ? 0.55 : 0.18;
  ctx.fillStyle = heavy ? '#c0ccdd' : '#ffffff';
  const clouds = heavy
    ? [[0.1,0.1,60],[0.2,0.08,45],[0.35,0.13,55],[0.5,0.07,70],[0.65,0.12,50],[0.8,0.09,60],[0.92,0.14,48],[0.05,0.2,40],[0.45,0.18,45],[0.75,0.17,52]]
    : [[0.12,0.08,40],[0.18,0.07,30],[0.08,0.09,28],[0.55,0.05,50],[0.62,0.04,38],[0.48,0.06,32],[0.85,0.12,44],[0.92,0.11,30],[0.78,0.13,35]];
  clouds.forEach(c => {
    ctx.beginPath(); ctx.arc(c[0]*w,c[1]*h,c[2],0,Math.PI*2); ctx.fill();
    if(heavy){ ctx.beginPath(); ctx.arc(c[0]*w+c[2]*0.7,c[1]*h-c[2]*0.3,c[2]*0.7,0,Math.PI*2); ctx.fill(); }
  });
  ctx.restore();
}

function drawHills(ctx, w, h) {
  ctx.save();
  ctx.globalAlpha=0.22; ctx.fillStyle='#5ab830';
  ctx.beginPath(); ctx.moveTo(0,h); ctx.quadraticCurveTo(w*0.25,h*0.72,w*0.5,h*0.82); ctx.quadraticCurveTo(w*0.75,h*0.92,w,h*0.76); ctx.lineTo(w,h); ctx.closePath(); ctx.fill();
  ctx.globalAlpha=0.16; ctx.fillStyle='#78d040';
  ctx.beginPath(); ctx.moveTo(0,h); ctx.quadraticCurveTo(w*0.3,h*0.84,w*0.6,h*0.88); ctx.quadraticCurveTo(w*0.8,h*0.92,w,h*0.85); ctx.lineTo(w,h); ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawStarsBG(ctx, w, h) {
  ctx.save();
  // twinkling stars
  const t = Date.now()*0.001;
  for(let s=0;s<120;s++){
    const sx = ((s*137.5)%100/100)*w;
    const sy = ((s*97.3)%60/100)*h;
    const twinkle = 0.4+0.6*Math.abs(Math.sin(t*1.5+s));
    ctx.globalAlpha = twinkle;
    ctx.fillStyle = s%5===0?'#ffeeaa':s%3===0?'#aaddff':'#ffffff';
    const r = s%7===0?2.5:s%4===0?1.8:1.2;
    ctx.beginPath(); ctx.arc(sx,sy,r,0,Math.PI*2); ctx.fill();
  }
  // moon
  ctx.globalAlpha=0.9;
  ctx.fillStyle='#fff8cc';
  ctx.shadowColor='#fffaaa'; ctx.shadowBlur=30;
  ctx.beginPath(); ctx.arc(w*0.82,h*0.12,28,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1a1a4e';
  ctx.shadowBlur=0;
  ctx.beginPath(); ctx.arc(w*0.82+10,h*0.12-6,22,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawFogBG(ctx, w, h) {
  // green foggy ground for frog mode
  ctx.save();
  for(let layer=0;layer<4;layer++){
    const y = h*(0.5+layer*0.12);
    const grad = ctx.createLinearGradient(0,y-40,0,y+40);
    grad.addColorStop(0,'rgba(100,180,80,0)');
    grad.addColorStop(0.5,`rgba(120,200,90,${0.08+layer*0.04})`);
    grad.addColorStop(1,'rgba(80,160,60,0)');
    ctx.fillStyle=grad;
    ctx.fillRect(0,y-40,w,80);
  }
  ctx.restore();
}

function drawBG() {
  bgCtx.clearRect(0,0,W(),H());
  if(fxMode==='star'){
    drawStarsBG(bgCtx,W(),H());
  } else if(fxMode==='rain'){
    drawClouds(bgCtx,W(),H(),true);
    drawHills(bgCtx,W(),H());
  }  else if(fxMode==='snow'){
    drawClouds(bgCtx,W(),H(),true);
    drawHills(bgCtx,W(),H());
    drawMistBG(bgCtx,W(),H());
  } else if(fxMode==='fire'){
    // celebratory dark bg - draw some distant city lights
    bgCtx.save();
    bgCtx.globalAlpha=0.3;
    for(let b=0;b<30;b++){
      const bx=((b*73)%100/100)*W();
      const bh=20+((b*53)%60);
      const bw=8+((b*37)%20);
      bgCtx.fillStyle=`hsl(${(b*30)%360},60%,40%)`;
      bgCtx.fillRect(bx,H()-bh,bw,bh);
    }
    bgCtx.restore();
  } else {
    drawClouds(bgCtx,W(),H(),false);
    drawHills(bgCtx,W(),H());
  }

  const t=Date.now()*0.001;
  const emojiSet = fxMode==='snow' ? FROGS : SPRING;
  bgP.forEach((p,idx) => {
    if(fxMode==='star') return; // no flowers in star mode
    p.wave+=p.waveSpeed; p.x+=p.vx+Math.sin(p.wave)*0.0007; p.y+=p.vy; p.rot+=p.rotV;
    if(p.y>1.05){p.y=-0.05;p.x=Math.random(); p.emoji=emojiSet[Math.floor(Math.random()*emojiSet.length)];}
    if(p.x<-0.05)p.x=1.05; if(p.x>1.05)p.x=-0.05;
    bgCtx.save();
    bgCtx.globalAlpha=p.alpha*(0.65+0.35*Math.sin(t*1.1+p.phase));
    bgCtx.translate(p.x*W(),p.y*H()); bgCtx.rotate(p.rot);
    bgCtx.font=p.size+'px serif'; bgCtx.textAlign='center'; bgCtx.textBaseline='middle';
    bgCtx.fillText(p.emoji,0,0);
    bgCtx.restore();
  });

  function drawMistBG(ctx, w, h) {
  ctx.save();
  // rolling mist layers
  const t = Date.now()*0.0005;
  for(let layer=0; layer<5; layer++){
    const y = h*(0.3+layer*0.15);
    const offset = Math.sin(t+layer*1.2)*40;
    const grad = ctx.createLinearGradient(0, y-60, 0, y+60);
    grad.addColorStop(0, 'rgba(220,230,240,0)');
    grad.addColorStop(0.5, `rgba(200,215,230,${0.12+layer*0.05})`);
    grad.addColorStop(1, 'rgba(220,230,240,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(offset, y-60, w+80, 120);
  }
  // ground frost
  const frost = ctx.createLinearGradient(0, h*0.75, 0, h);
  frost.addColorStop(0, 'rgba(220,235,245,0)');
  frost.addColorStop(1, 'rgba(210,228,240,0.4)');
  ctx.fillStyle = frost;
  ctx.fillRect(0, h*0.75, w, h*0.25);
  ctx.restore();
}
}

// ── FX ──
let fxMode = null;
const fxP = [];
const fxBtns = {star:'btnStar',rain:'btnRain',snow:'btnSnow',fire:'btnFire'};

function setMode(mode) {
  scene.classList.remove('mode-star','mode-rain','mode-snow','mode-fire');
  if(mode) scene.classList.add('mode-'+mode);
}

function toggleFX(mode) {
  if(fxMode===mode){
    fxMode=null; fxP.length=0;
    document.getElementById(fxBtns[mode]).classList.remove('active');
    setMode(null);
  } else {
    Object.values(fxBtns).forEach(id=>document.getElementById(id).classList.remove('active'));
    fxMode=mode; fxP.length=0;
    document.getElementById(fxBtns[mode]).classList.add('active');
    setMode(mode);
    const msgs={star:'🌙 Night sky mode!',rain:'🌧️ Cloudy skies!',snow:'🐸 Frog world!',fire:'🎆 Fireworks!'};
    showToast(msgs[mode]);
  }
}

function spawnFirework() {
  const x = 0.1*W() + Math.random()*0.8*W();
  const y = Math.random()*H()*0.55;
  const hue = Math.random()*360;
  const count = 80+Math.floor(Math.random()*50);
  // rocket trail
  fxP.push({isRocket:true, x, y:H(), tx:x, ty:y, vx:0, vy:-18, hue, life:1, decay:0.018, size:3});
  for(let i=0;i<count;i++){
    const angle=(i/count)*Math.PI*2;
    const speed=1.5+Math.random()*6;
    const sparkHue=hue+(Math.random()-0.5)*60;
    fxP.push({
      isFire:true, x, y,
      vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed,
      alpha:1, life:1,
      decay:0.008+Math.random()*0.012,
      size:2+Math.random()*3,
      hue:sparkHue, trail:[], twinkle:Math.random()*Math.PI*2,
      delayed:true, delay:3+Math.floor(Math.random()*2)
    });
  }
 fxP.push({isRocket:true, x, y:H(), tx:x, ty:y, vx:0, vy:-28, hue, life:1, decay:0.025, size:3});
}

function drawSnowflake(ctx,x,y,r,alpha,rot){
  ctx.save(); ctx.globalAlpha=alpha; ctx.strokeStyle='#cceeff'; ctx.lineWidth=1.2;
  ctx.translate(x,y); ctx.rotate(rot);
  for(let a=0;a<6;a++){
    ctx.save(); ctx.rotate((a*Math.PI)/3);
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-r); ctx.stroke();
    const b=r*0.45;
    ctx.beginPath(); ctx.moveTo(0,-b); ctx.lineTo(r*0.28,-b*0.65); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,-b); ctx.lineTo(-r*0.28,-b*0.65); ctx.stroke();
    const b2=r*0.72;
    ctx.beginPath(); ctx.moveTo(0,-b2); ctx.lineTo(r*0.2,-b2*0.78); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,-b2); ctx.lineTo(-r*0.2,-b2*0.78); ctx.stroke();
    ctx.restore();
  }
  ctx.beginPath(); ctx.arc(0,0,r*0.12,0,Math.PI*2); ctx.fillStyle='#ddf4ff'; ctx.fill();
  ctx.restore();
}

function spawnFX(){
  if(!fxMode) return;
  if(fxMode==='star'){
    for(let i=0;i<2;i++) fxP.push({x:Math.random()*W(),y:Math.random()*H()*0.8,vx:(Math.random()-0.5)*0.8,vy:-0.3-Math.random()*1,size:8+Math.random()*14,alpha:1,life:1,decay:0.006+Math.random()*0.005,emoji:'⭐',rot:Math.random()*360,rotV:(Math.random()-0.5)*2,twinkle:Math.random()*Math.PI*2});
  } else if(fxMode==='rain'){
    for(let i=0;i<8;i++) fxP.push({x:Math.random()*W(),y:-10,vx:(Math.random()-0.5)*0.5,vy:8+Math.random()*5,len:14+Math.random()*14,alpha:0.5+Math.random()*0.3,life:1,decay:0,isRain:true,color:`hsl(${200+Math.random()*20},60%,${60+Math.random()*20}%)`});
  } else if(fxMode==='snow'){
    for(let i=0;i<3;i++) fxP.push({x:Math.random()*W(),y:-16,vx:(Math.random()-0.5)*1.2,vy:2.5+Math.random()*3.5,r:5+Math.random()*9,alpha:0.7+Math.random()*0.25,life:1,decay:0,isSnow:true,rot:Math.random()*Math.PI*2,rotV:(Math.random()-0.5)*0.02,wave:Math.random()*Math.PI*2,waveS:0.03+Math.random()*0.03,waveA:0.7+Math.random()*1.0});
  } else if(fxMode==='fire'){
    if(Math.random()<0.15) spawnFirework();
  }
}

function drawFX(){
  fxCtx.clearRect(0,0,W(),H());
  const t=Date.now()*0.001;
  for(let i=fxP.length-1;i>=0;i--){
    const p=fxP[i];

    if(p.delayed){ p.delay--; if(p.delay>0) continue; p.delayed=false; }

    if(p.isRocket){
      p.life-=p.decay; if(p.life<=0){fxP.splice(i,1);continue;}
      p.x+=p.vx; p.y+=p.vy;
      fxCtx.save(); fxCtx.globalAlpha=p.life*0.8;
      fxCtx.strokeStyle=`hsl(${p.hue},100%,80%)`; fxCtx.lineWidth=2;
      fxCtx.shadowColor=`hsl(${p.hue},100%,70%)`; fxCtx.shadowBlur=8;
      fxCtx.beginPath(); fxCtx.moveTo(p.x,p.y); fxCtx.lineTo(p.x,p.y+12); fxCtx.stroke();
      fxCtx.restore();
    } else if(p.isRain){
      if(p.y>H()+20){fxP.splice(i,1);continue;}
      p.x+=p.vx; p.y+=p.vy;
      fxCtx.save(); fxCtx.globalAlpha=p.alpha; fxCtx.strokeStyle=p.color; fxCtx.lineWidth=1.5;
      fxCtx.beginPath(); fxCtx.moveTo(p.x,p.y); fxCtx.lineTo(p.x+p.vx*2,p.y+p.len); fxCtx.stroke(); fxCtx.restore();
    } else if(p.isSnow){
      if(p.y>H()+30){fxP.splice(i,1);continue;}
      p.wave+=p.waveS; p.x+=p.vx+Math.sin(p.wave)*p.waveA*0.08; p.y+=p.vy; p.rot+=p.rotV;
      drawSnowflake(fxCtx,p.x,p.y,p.r,p.alpha,p.rot);
    } else if(p.isFlash){
      p.life-=p.decay; if(p.life<=0){fxP.splice(i,1);continue;}
      p.radius+=p.maxR*0.1;
      fxCtx.save(); fxCtx.globalAlpha=p.alpha*p.life*0.5;
      const grd=fxCtx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.radius);
      grd.addColorStop(0,`hsla(${p.hue},100%,95%,1)`);
      grd.addColorStop(0.4,`hsla(${p.hue},100%,70%,0.6)`);
      grd.addColorStop(1,`hsla(${p.hue},100%,50%,0)`);
      fxCtx.fillStyle=grd;
      fxCtx.beginPath(); fxCtx.arc(p.x,p.y,p.radius,0,Math.PI*2); fxCtx.fill();
      fxCtx.restore();
    } else if(p.isFire){
      p.life-=p.decay; if(p.life<=0){fxP.splice(i,1);continue;}
      p.trail.push({x:p.x,y:p.y,life:p.life});
      if(p.trail.length>10) p.trail.shift();
      p.x+=p.vx; p.y+=p.vy;
      p.vx*=0.96; p.vy=p.vy*0.96+0.09;
      // trail
      for(let tr=0;tr<p.trail.length;tr++){
        const ta=(tr/p.trail.length)*p.trail[tr].life*0.6;
        fxCtx.save(); fxCtx.globalAlpha=ta;
        fxCtx.shadowColor=`hsla(${p.hue},100%,60%,1)`; fxCtx.shadowBlur=6;
        fxCtx.fillStyle=`hsla(${p.hue},100%,65%,1)`;
        fxCtx.beginPath(); fxCtx.arc(p.trail[tr].x,p.trail[tr].y,p.size*0.6*(tr/p.trail.length),0,Math.PI*2); fxCtx.fill();
        fxCtx.restore();
      }
      // spark
      fxCtx.save();
      fxCtx.globalAlpha=p.life*(0.85+0.15*Math.sin(t*8+p.twinkle));
      fxCtx.shadowColor=`hsla(${p.hue},100%,80%,1)`; fxCtx.shadowBlur=12;
      const grad=fxCtx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size);
      grad.addColorStop(0,`hsla(${p.hue+40},100%,100%,1)`);
      grad.addColorStop(0.3,`hsla(${p.hue},100%,75%,1)`);
      grad.addColorStop(1,`hsla(${p.hue-20},100%,50%,0)`);
      fxCtx.fillStyle=grad;
      fxCtx.beginPath(); fxCtx.arc(p.x,p.y,p.size,0,Math.PI*2); fxCtx.fill();
      fxCtx.restore();
    } else {
      // emoji star particles
      p.life-=p.decay; if(p.life<=0){fxP.splice(i,1);continue;}
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.rotV; p.vy+=0.02;
      fxCtx.save(); fxCtx.globalAlpha=p.alpha*p.life*(0.7+0.3*Math.sin(t*6+p.twinkle));
      fxCtx.translate(p.x,p.y); fxCtx.rotate(p.rot*Math.PI/180);
      fxCtx.font=p.size+'px serif'; fxCtx.textAlign='center'; fxCtx.textBaseline='middle';
      fxCtx.fillText(p.emoji,0,0); fxCtx.restore();
    }
  }
  if(fxMode && fxP.length<800) spawnFX();
}

function loop(){ drawBG(); drawFX(); requestAnimationFrame(loop); }
loop();

let cakeVisible=false;
function toggleCake(){
  cakeVisible=!cakeVisible;
  document.getElementById('cakeWrap').classList.toggle('visible',cakeVisible);
  document.getElementById('btnCake').classList.toggle('active',cakeVisible);
  if(cakeVisible) showToast('🎂 Birthday cake!');
}

function showSurprise(){
  document.getElementById('surpriseBox').classList.add('visible');
  // switch to celebrate mode
  const prevMode=fxMode;
  if(fxMode!=='fire'){ fxMode='fire'; fxP.length=0; setMode('fire'); }
  triggerConfetti();
}
function closeSurprise(){
  document.getElementById('surpriseBox').classList.remove('visible');
  if(fxMode==='fire' && !document.getElementById('btnFire').classList.contains('active')){
    fxMode=null; fxP.length=0; setMode(null);
  }
}

function triggerConfetti(){
  const em=['🌸','🌼','✨','🌟','🎉','🎊','🎆','🎇','💛','🥂'];
  for(let i=0;i<60;i++) fxP.push({
    x:W()/2+(Math.random()-0.5)*300, y:H()*0.4,
    vx:(Math.random()-0.5)*10, vy:-5-Math.random()*8,
    size:14+Math.random()*14, alpha:1, life:1,
    decay:0.01+Math.random()*0.008,
    emoji:em[Math.floor(Math.random()*em.length)],
    rot:Math.random()*360, rotV:(Math.random()-0.5)*6,
    twinkle:Math.random()*Math.PI*2
  });
  // also shoot fireworks
  for(let f=0;f<5;f++) setTimeout(()=>spawnFirework(), f*400);
}

function showToast(msg){
  const c=document.getElementById('toastContainer');
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  c.appendChild(t); setTimeout(()=>t.remove(),3200);
}
</script>
